<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e2130;
    }
    .header .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #9333ea);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header .logo svg { width: 16px; height: 16px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 8px 12px;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #6366f1; }
    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .status.success { display: block; background: #065f46; color: #6ee7b7; }
    .status.error { display: block; background: #7f1d1d; color: #fca5a5; }
    .status.info { display: block; background: #1e3a5f; color: #93c5fd; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #9333ea);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      color: #9ca3af;
      margin-top: 8px;
    }
    .btn-secondary:hover { border-color: #6366f1; color: #e5e7eb; }
    .url-preview {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
      word-break: break-all;
      max-height: 32px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
    </div>
    <h1>UYTDownloader</h1>
  </div>

  <div class="field">
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3000" />
  </div>

  <div id="status" class="status"></div>

  <div id="urlInfo" style="margin-bottom: 12px; display: none;">
    <label style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin-bottom: 4px; display: block;">Current Page</label>
    <div id="urlPreview" class="url-preview"></div>
  </div>

  <button id="sendBtn" class="btn btn-primary" disabled>Send to UYTDownloader</button>
  <button id="openBtn" class="btn btn-secondary">Open UYTDownloader</button>

  <script src="popup.js"></script>
</body>
</html>
